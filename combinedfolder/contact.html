<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ｜岩川県交通</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; margin: 0; background: #f4f7f9; color: #333; }
        header { background: #0d47a1; color: white; padding: 15px 20px; border-bottom: 4px solid #2e7d32; }
        .hero { background: #0d47a1; color: white; padding: 40px 20px; text-align: center; }
        .container { max-width: 700px; margin: -20px auto 40px; padding: 30px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #0d47a1; }
        input[type="text"], input[type="email"], select, textarea {
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px;
        }
        textarea { height: 150px; resize: vertical; }
        
        .submit-btn {
            width: 100%; background: #2e7d32; color: white; border: none; padding: 15px;
            border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s;
        }
        .submit-btn:hover { background: #1b5e20; }
        
        .contact-info { margin-top: 30px; padding: 20px; background: #e3f2fd; border-radius: 10px; font-size: 14px; }
        .btn-home { display: block; width: fit-content; margin: 30px auto; padding: 10px 25px; background: #666; color: white; text-decoration: none; border-radius: 50px; font-size: 14px; }
    </style>
</head>
<body>

<header><div style="font-weight:900; font-size:20px;">岩川県交通</div></header>

<div class="hero">
    <h1 style="margin:0;">お問い合わせ</h1>
    <p>ご意見・ご要望・忘れ物のお問い合わせはこちら</p>
</div>

<div class="container">
    <form onsubmit="handleSubmit(event)">
        <div class="form-group">
            <label>お問い合わせ項目</label>
            <select required>
                <option value="">選択してください</option>
                <option value="forget">忘れ物について</option>
                <option value="route">路線・時刻表について</option>
                <option value="opinion">ご意見・ご要望</option>
                <option value="other">その他</option>
            </select>
        </div>

        <div class="form-group">
            <label>お名前</label>
            <input type="text" placeholder="例：岩川 太郎" required>
        </div>

        <div class="form-group">
            <label>メールアドレス</label>
            <input type="email" placeholder="example@mail.com" required>
        </div>

        <div class="form-group">
            <label>お問い合わせ内容</label>
            <textarea placeholder="詳しい内容をご記入ください（忘れ物の場合は、乗車日時や路線名もお願いします）" required></textarea>
        </div>

        <button type="submit" class="submit-btn">内容を確認して送信</button>
    </form>

    <div class="contact-info">
        <strong>お急ぎの方はお電話で</strong><br>
        岩川県交通 サービスセンター： 000-0000-0000<br>
        （受付時間：平日 9:00〜18:00）
    </div>

    <a href="../index.html" class="btn-home">トップページに戻る</a>
</div>

<script>
    function handleSubmit(event) {
        event.preventDefault();
        alert("お問い合わせありがとうございます。送信（シミュレーション）が完了しました。");
        window.location.href = "../index.html";
    }
</script>

</body>
</html>
