<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ｜岩川県交通</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; margin: 0; background: #f4f7f9; color: #333; }
        header { background: #0d47a1; color: white; padding: 15px 20px; border-bottom: 4px solid #2e7d32; }
        .hero { background: #0d47a1; color: white; padding: 40px 20px; text-align: center; }
        .container { max-width: 700px; margin: -20px auto 40px; padding: 30px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); min-height: 400px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #0d47a1; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        textarea { height: 150px; resize: vertical; }
        .submit-btn { width: 100%; background: #2e7d32; color: white; border: none; padding: 18px; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 0 #1b5e20; }
        .submit-btn:hover { background: #1b5e20; transform: translateY(2px); box-shadow: 0 2px 0 #1b5e20; }
        .submit-btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
        
        /* 完了メッセージ */
        #thanks-message { display: none; text-align: center; padding: 40px 0; animation: fadeIn 0.5s ease; }
        /* エラーメッセージ */
        #error-message { display: none; color: #d32f2f; background: #ffebee; border: 1px solid #ffcdd2; padding: 15px; border-radius: 10px; margin-top: 20px; line-height: 1.6; text-align: left; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-home { display: inline-block; margin-top: 30px; padding: 12px 30px; background: #666; color: white; text-decoration: none; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>

<header><div style="font-weight:900; font-size:20px;">岩川県交通</div></header>

<div class="hero">
    <h1 style="margin:0; font-size: 28px;">お問い合わせ</h1>
    <p style="opacity: 0.9;">ご意見や不具合報告などはこちらからお送りください</p>
</div>

<div class="container">
    <form id="contact-form">
        <div class="form-group">
            <label>お問い合わせ項目</label>
            <select name="項目" required>
                <option value="">選択してください</option>
                <option value="不具合報告">不具合報告</option>
                <option value="ご質問">ご質問</option>
                <option value="路線・時刻">路線・時刻表について</option>
                <option value="ご意見">ご意見・ご要望</option>
                <option value="その他">その他</option>
            </select>
        </div>

        <div class="form-group">
            <label>お名前（ニックネーム可）</label>
            <input type="text" name="お名前" placeholder="例：岩川 太郎" required>
        </div>

        <div class="form-group">
            <label>メールアドレス（返信用）</label>
            <input type="email" name="email" placeholder="example@mail.com" required>
        </div>

        <div class="form-group">
            <label>内容</label>
            <textarea name="内容" placeholder="詳しい内容をご記入ください" required></textarea>
        </div>

        <button type="submit" id="submit-btn" class="submit-btn">内容を送信する</button>
    </form>

    <div id="thanks-message">
        <div style="font-size:60px; color:#2e7d32; margin-bottom:20px;">✅</div>
        <h2 style="color:#2e7d32; margin-bottom: 10px;">お問い合わせありがとうございます。</h2>
        <p style="font-weight: bold;">フォームは、岩川県交通へ送信されました。</p>
        <a href="../index.html" class="btn-home">トップページへ戻る</a>
    </div>

    <div id="error-message">
        <strong>送信に失敗しました。</strong><br>
        時間をあけて再度お試しください。<br>
        しばらく待っても送信できない場合はDiscordサーバーでご報告お願い致します。
    </div>
</div>

<script>
    const form = document.getElementById('contact-form');
    const btn = document.getElementById('submit-btn');
    const thanks = document.getElementById('thanks-message');
    const errorMsg = document.getElementById('error-message');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "送信中...";
        errorMsg.style.display = 'none';

        const formData = new FormData(form);
        
        try {
            // 社長専用ID: xjgoglrl
            const response = await fetch("https://formspree.io/f/xjgoglrl", {
                method: "POST",
                body: formData,
                headers: { 'Accept': 'application/json' }
            });

            if (response.ok) {
                form.style.display = 'none';
                thanks.style.display = 'block';
            } else {
                throw new Error('fail');
            }
        } catch (error) {
            btn.disabled = false;
            btn.innerText = "内容を送信する";
            errorMsg.style.display = 'block';
        }
    });
</script>

</body>
</html>
